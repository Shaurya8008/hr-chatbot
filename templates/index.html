<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Assistant | Recruitment & Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #008080;
            --secondary-teal: #00b3b3;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --bg-light: #f0f4f3;
            --bg-dark: #0f1115;
            --text-light: #1a1a2e;
            --text-dark: #e8e8ed;
            --bot-bubble-light: #ffffff;
            --bot-bubble-dark: #1a1d23;
            --user-bubble: linear-gradient(135deg, #008080, #00b3b3);
            --card-bg-light: #f8fffe;
            --card-bg-dark: #1e2128;
            --border-light: rgba(0, 128, 128, 0.15);
            --border-dark: rgba(0, 179, 179, 0.2);
            --shadow-light: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-dark: 0 4px 20px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: var(--transition);
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        #app-container {
            width: 100%;
            max-width: 620px;
            height: 92vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--shadow-light);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
            transition: var(--transition);
            overflow: hidden;
        }

        body.dark-mode #app-container {
            background: rgba(26, 29, 35, 0.95);
            border: 1px solid var(--border-dark);
            box-shadow: var(--shadow-dark);
        }

        header {
            padding: 18px 24px;
            background: linear-gradient(135deg, #006666, #008080, #00a3a3);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-info h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
        .header-info p { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

        .controls { display: flex; gap: 8px; align-items: center; z-index: 1; }

        button.toggle-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        button.toggle-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-1px); }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-teal) transparent;
        }
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--primary-teal); border-radius: 10px; }

        /* Messages */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.55;
            animation: fadeIn 0.35s ease;
            white-space: pre-line;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-bubble-light);
            color: var(--text-light);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        body.dark-mode .bot-message { background: var(--bot-bubble-dark); color: var(--text-dark); }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Job List Cards */
        .job-list-container { margin-top: 10px; }
        .job-list-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; color: var(--primary-teal); }

        .job-card {
            background: var(--card-bg-light);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark-mode .job-card { background: var(--card-bg-dark); border-color: var(--border-dark); }
        .job-card:hover { border-color: var(--primary-teal); transform: translateX(4px); box-shadow: 0 2px 12px rgba(0,128,128,0.15); }

        .job-card-info h4 { font-size: 0.88rem; font-weight: 600; margin-bottom: 3px; }
        .job-card-info span { font-size: 0.75rem; opacity: 0.7; }

        .job-card-action {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .match-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            color: white;
        }
        .match-high { background: var(--accent-green); }
        .match-medium { background: var(--accent-orange); }
        .match-low { background: var(--accent-red); }

        .arrow-icon { color: var(--primary-teal); font-size: 1.1rem; font-weight: 700; }

        /* Job Detail Card */
        .job-detail-card {
            background: var(--card-bg-light);
            border: 1px solid var(--primary-teal);
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
        }
        body.dark-mode .job-detail-card { background: var(--card-bg-dark); }

        .job-detail-card h3 { font-size: 1rem; font-weight: 700; color: var(--primary-teal); margin-bottom: 12px; }
        .job-detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; }
        .job-detail-label { font-weight: 600; min-width: 90px; color: var(--primary-teal); }
        .job-detail-skills { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
        .skill-tag {
            background: rgba(0, 128, 128, 0.1);
            color: var(--primary-teal);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 500;
        }
        body.dark-mode .skill-tag { background: rgba(0, 179, 179, 0.15); }

        .job-detail-actions { display: flex; gap: 8px; margin-top: 14px; }

        .btn-apply-now, .btn-auto-apply {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-apply-now { background: var(--primary-teal); color: white; }
        .btn-apply-now:hover { background: var(--secondary-teal); transform: translateY(-1px); }
        .btn-auto-apply { background: transparent; color: var(--primary-teal); border: 1.5px solid var(--primary-teal); }
        .btn-auto-apply:hover { background: rgba(0, 128, 128, 0.08); }

        /* Forms */
        .form-container {
            background: var(--card-bg-light);
            border: 1px solid var(--primary-teal);
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        body.dark-mode .form-container { background: var(--card-bg-dark); }
        .form-container strong { color: var(--primary-teal); font-size: 0.95rem; }

        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--primary-teal); }
        .form-group input, .form-group select, .form-group textarea {
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
        }
        body.dark-mode .form-group input, body.dark-mode .form-group textarea {
            background: #2a2d35; border-color: #444; color: white;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-teal); }

        .submit-btn {
            background: var(--primary-teal);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .submit-btn:hover { background: var(--secondary-teal); }

        /* Card (legacy) */
        .card {
            background: rgba(0, 128, 128, 0.05);
            border: 1px solid var(--primary-teal);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }
        .card-item { padding: 5px 0; border-bottom: 1px solid rgba(0, 128, 128, 0.1); font-size: 0.85rem; }
        .card-item:last-child { border-bottom: none; }

        /* Quick Replies */
        #quick-replies {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        #quick-replies::-webkit-scrollbar { display: none; }

        .qr-btn {
            background: white;
            border: 1px solid var(--primary-teal);
            color: var(--primary-teal);
            padding: 7px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            transition: var(--transition);
        }
        body.dark-mode .qr-btn { background: var(--card-bg-dark); }
        .qr-btn:hover { background: var(--primary-teal); color: white; }

        /* Input Area */
        #input-area {
            padding: 16px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid var(--border-light);
        }
        body.dark-mode #input-area { border-top: 1px solid var(--border-dark); }

        .upload-btn {
            background: none;
            border: 1.5px solid var(--primary-teal);
            color: var(--primary-teal);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .upload-btn:hover { background: rgba(0,128,128,0.1); transform: scale(1.05); }

        input#user-input {
            flex: 1;
            padding: 11px 18px;
            border-radius: 25px;
            border: 1.5px solid #ddd;
            outline: none;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            background: white;
            transition: var(--transition);
        }
        body.dark-mode input#user-input { background: #2a2d35; border-color: #444; color: white; }
        input#user-input:focus { border-color: var(--primary-teal); }

        #send-btn {
            background: linear-gradient(135deg, var(--primary-teal), var(--secondary-teal));
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        #send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px rgba(0,128,128,0.3); }

        /* Typing Indicator */
        .typing { display: flex; gap: 5px; padding: 8px; }
        .dot {
            width: 8px; height: 8px;
            background: #bbb; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Hidden file input */
        #resume-file { display: none; }

        /* Responsive */
        @media (max-width: 600px) {
            #app-container { height: 100vh; border-radius: 0; max-width: 100%; }
            header { border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-info">
                <h1 id="bot-name">HR Assistant</h1>
                <p id="mode-status">Mode: Candidate</p>
            </div>
            <div class="controls">
                <button class="toggle-btn" id="mode-toggle">Switch to Employee</button>
                <button class="toggle-btn" id="theme-toggle">🌙</button>
            </div>
        </header>

        <div id="chat-window">
            <div class="message bot-message">
                Hello! I'm your HR Assistant. I can help you browse jobs, upload your resume for smart matching, and apply to positions. How can I help you today?
            </div>
        </div>

        <div id="quick-replies"></div>

        <div id="input-area">
            <button class="upload-btn" id="upload-btn" title="Upload Resume (PDF)">📎</button>
            <input type="file" id="resume-file" accept=".pdf">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modeToggle = document.getElementById('mode-toggle');
        const themeToggle = document.getElementById('theme-toggle');
        const modeStatus = document.getElementById('mode-status');
        const quickReplies = document.getElementById('quick-replies');
        const uploadBtn = document.getElementById('upload-btn');
        const resumeFile = document.getElementById('resume-file');

        let currentMode = 'candidate';
        let isDarkMode = false;
        let savedEmail = '';  // Track user's email for auto-apply

        const candidateQR = ["View job openings", "Upload resume", "Check application status", "How to apply?"];
        const employeeQR = ["Leave policy", "Salary info", "Onboarding FAQ", "How to resign?"];

        function updateQuickReplies() {
            quickReplies.innerHTML = '';
            const replies = currentMode === 'candidate' ? candidateQR : employeeQR;
            replies.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'qr-btn';
                btn.textContent = text;
                btn.onclick = () => {
                    if (text === 'Upload resume') {
                        resumeFile.click();
                    } else {
                        userInput.value = text;
                        sendMessage();
                    }
                };
                quickReplies.appendChild(btn);
            });
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            
            // Plain string
            if (typeof content === 'string') {
                msgDiv.innerHTML = formatText(content);
            }
            // Structured text
            else if (content.type === 'text') {
                msgDiv.innerHTML = formatText(content.content);
            }
            // Clickable job list
            else if (content.type === 'job_list') {
                let html = `<div class="job-list-container">`;
                html += `<div class="job-list-title">${content.content.title}</div>`;
                content.content.jobs.forEach(job => {
                    let matchHtml = '';
                    if (job.match !== undefined) {
                        const cls = job.match >= 50 ? 'match-high' : (job.match >= 30 ? 'match-medium' : 'match-low');
                        matchHtml = `<span class="match-badge ${cls}">${job.match}% match</span>`;
                    }
                    html += `<div class="job-card" onclick="fetchJobDetail(${job.id})">
                        <div class="job-card-info">
                            <h4>${job.title}</h4>
                            <span>${job.department} · ${job.location}</span>
                        </div>
                        <div class="job-card-action">
                            ${matchHtml}
                            <span class="arrow-icon">→</span>
                        </div>
                    </div>`;
                });
                html += `</div>`;
                msgDiv.innerHTML = html;
            }
            // Job detail with apply button
            else if (content.type === 'job_detail') {
                const job = content.content;
                const skillTags = job.skills.split(',').map(s => `<span class="skill-tag">${s.trim()}</span>`).join('');
                msgDiv.innerHTML = `<div class="job-detail-card">
                    <h3>${job.title}</h3>
                    <div class="job-detail-row"><span class="job-detail-label">Department</span><span>${job.department}</span></div>
                    <div class="job-detail-row"><span class="job-detail-label">Location</span><span>${job.location}</span></div>
                    <div class="job-detail-row"><span class="job-detail-label">Description</span><span>${job.description}</span></div>
                    <div class="job-detail-skills">${skillTags}</div>
                    <div class="job-detail-actions">
                        <button class="btn-apply-now" onclick="showApplyForm(${job.id}, '${job.title.replace(/'/g, "\\'")}')">📝 Apply Now</button>
                        <button class="btn-auto-apply" onclick="autoApply(${job.id})">🚀 Auto-Apply</button>
                    </div>
                </div>`;
            }
            // Form
            else if (content.type === 'form') {
                msgDiv.innerHTML = buildFormHtml();
            }
            // Card (legacy)
            else if (content.type === 'card') {
                let html = `<strong>${content.content.title}</strong><div class="card">`;
                content.content.items.forEach(item => {
                    html += `<div class="card-item">${formatText(item)}</div>`;
                });
                html += `</div>`;
                msgDiv.innerHTML = html;
            }

            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function buildFormHtml(jobId = '', jobTitle = '') {
            const formId = Date.now();
            return `<div class="form-container" data-form-id="${formId}">
                <strong>📝 Submit Application</strong>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-name" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-email" placeholder="your.email@example.com" value="${savedEmail}">
                </div>
                <div class="form-group">
                    <label>Position${jobTitle ? ': ' + jobTitle : ' ID'}</label>
                    <input type="text" class="form-pos" value="${jobId}" placeholder="${jobTitle || 'Enter position ID'}" ${jobId ? 'readonly' : ''}>
                </div>
                <button class="submit-btn" onclick="submitApplication(this)">Submit Application →</button>
            </div>`;
        }

        function showApplyForm(jobId, jobTitle) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot-message';
            msgDiv.innerHTML = buildFormHtml(jobId, jobTitle);
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message typing-indicator';
            typingDiv.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            typingDiv.id = 'typing-indicator';
            chatWindow.appendChild(typingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, mode: currentMode, email: savedEmail })
                });
                const data = await response.json();
                removeTyping();
                appendMessage('bot', data);
            } catch (error) {
                removeTyping();
                appendMessage('bot', 'Sorry, something went wrong. Please try again.');
            }
        }

        async function fetchJobDetail(jobId) {
            showTyping();
            try {
                const response = await fetch(`/job/${jobId}`);
                const data = await response.json();
                removeTyping();
                appendMessage('bot', data);
            } catch (error) {
                removeTyping();
                appendMessage('bot', 'Error loading job details.');
            }
        }

        async function submitApplication(btn) {
            const form = btn.closest('.form-container');
            const name = form.querySelector('.form-name')?.value;
            const email = form.querySelector('.form-email')?.value;
            const pos = form.querySelector('.form-pos')?.value;

            if (!name || !email || !pos) {
                alert('Please fill in all fields.');
                return;
            }

            savedEmail = email;
            showTyping();
            try {
                const response = await fetch('/submit_application', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, position_id: pos })
                });
                const data = await response.json();
                removeTyping();
                appendMessage('bot', data);
            } catch (error) {
                removeTyping();
                appendMessage('bot', 'Error submitting application.');
            }
        }

        async function autoApply(jobId) {
            if (!savedEmail) {
                appendMessage('bot', '⚠️ To use **Auto-Apply**, please upload your resume first using the 📎 button. I need your profile to apply on your behalf.');
                return;
            }
            showTyping();
            try {
                const response = await fetch('/auto_apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: savedEmail, job_id: jobId })
                });
                const data = await response.json();
                removeTyping();
                appendMessage('bot', data);
            } catch (error) {
                removeTyping();
                appendMessage('bot', 'Error during auto-apply.');
            }
        }

        // Resume Upload
        uploadBtn.onclick = () => resumeFile.click();

        resumeFile.onchange = async () => {
            const file = resumeFile.files[0];
            if (!file) return;

            appendMessage('user', `📎 Uploading resume: ${file.name}`);
            showTyping();

            const formData = new FormData();
            formData.append('resume', file);

            try {
                const response = await fetch('/upload_resume', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                removeTyping();

                // Try to capture email from the response for auto-apply
                if (data.type === 'text' && data.content) {
                    const emailMatch = data.content.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
                    if (emailMatch) savedEmail = emailMatch[0];
                }
                if (data.type === 'job_list') {
                    // Profile was saved; we have their email
                    appendMessage('bot', {type: 'text', content: '📄 **Resume parsed successfully!** Here are your best job matches based on your skills:'});
                }

                appendMessage('bot', data);
            } catch (error) {
                removeTyping();
                appendMessage('bot', 'Error uploading resume. Please try again.');
            }

            resumeFile.value = '';
        };

        // Mode toggle
        modeToggle.onclick = () => {
            currentMode = currentMode === 'candidate' ? 'employee' : 'candidate';
            modeStatus.textContent = `Mode: ${currentMode.charAt(0).toUpperCase() + currentMode.slice(1)}`;
            modeToggle.textContent = currentMode === 'candidate' ? 'Switch to Employee' : 'Switch to Candidate';
            updateQuickReplies();
            appendMessage('bot', `Switched to <strong>${currentMode}</strong> mode. How can I help you as a ${currentMode}?`);
        };

        // Theme toggle
        themeToggle.onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = isDarkMode ? '☀️' : '🌙';
        };

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Init
        updateQuickReplies();
    </script>
</body>
</html>
